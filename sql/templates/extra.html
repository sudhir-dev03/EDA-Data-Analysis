<!DOCTYPE html>
<html>
<head>
    <title>Extra Details</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            border-color: #667eea;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Extra Details</h2>

    <form action="/submit_extra/{{ user_id }}" method="POST">

        <input type="text" name="course" placeholder="Course" required>
        <input type="text" name="hobby" placeholder="Hobby" required>
        <input type="number" name="experience" placeholder="Experience (years)" required>

        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
